name: Sync GitLab Contributions
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Modern Sync
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: akashkalathiya46
        run: |
          git config --global user.email "akashkalathiya46@gmail.com"
          git config --global user.name "Akash-ptl"
          
          # Get Official GitLab User ID
          USER_ID=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "https://gitlab.com/api/v4/users?username=$GITLAB_USERNAME" | jq -r '.[0].id')
          
          if [ "$USER_ID" == "null" ] || [ -z "$USER_ID" ]; then
            echo "Error: Could not find GitLab User ID. Please check your token and username."
            exit 1
          fi

          # Fetch unique contribution dates from Events API (last 100 events for now to test)
          DATES=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "https://gitlab.com/api/v4/users/$USER_ID/events?per_page=100" | jq -r '.[].created_at' | cut -d'T' -f1 | sort | uniq)

          for DATE in $DATES; do
            # Create a mock commit only if it doesn't already exist for that date in history
            # (Simplifying for demo, will create one commit per active day found)
            echo "Syncing active day: $DATE"
            git commit --allow-empty -m "GitLab Sync: $DATE" --date="${DATE}T12:00:00"
          done

          git push origin main
