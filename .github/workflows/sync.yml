name: Sync GitLab Contributions (2026 Standard)
on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout GitHub Repo (v4 2026 patched)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dynamic GitLab API Sync
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: akashkalathiya46
        run: |
          git config --global user.email "akashkalathiya46@gmail.com"
          git config --global user.name "Akash-ptl"
          
          # Fetching User ID using latest GitLab REST API v4
          USER_ID=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "https://gitlab.com/api/v4/users?username=$GITLAB_USERNAME" | jq -r '.[0].id')
          
          if [[ "$USER_ID" == "null" || -z "$USER_ID" ]]; then
            echo "::error::Could not find GitLab User. Checking public profile fallback..."
            USER_ID=$(curl -s "https://gitlab.com/api/v4/users?username=$GITLAB_USERNAME" | jq -r '.[0].id')
          fi

          # Fetch up to 200 recent events for synchronization (2026 API standard)
          DATES=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "https://gitlab.com/api/v4/users/$USER_ID/events?per_page=100&action=pushed" | jq -r '.[].created_at' | cut -d'T' -f1 | sort | uniq)

          for DATE in $DATES; do
            echo "Processing activity for: $DATE"
            git commit --allow-empty -m "GitLab Activity Sync: $DATE [2026-Automated]" --date="${DATE}T12:00:00"
          done

          # Push using standard main branch (2026 default)
          git push -f origin main
